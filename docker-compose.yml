version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smart_budget_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/smart_budget_db}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      CORS_ORIGIN_REGEX: ${CORS_ORIGIN_REGEX:-https?://(localhost|127\\.0\\.0\\.1)(:\\d+)?$}
      MODEL_PATH: ${MODEL_PATH:-app/ml/ml_model.pkl}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      AUTH_REQUIRED: ${AUTH_REQUIRED:-false}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-insecure-secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      DEFAULT_USER_ID: ${DEFAULT_USER_ID:-1}
      AI_RATE_LIMIT_PER_MINUTE: ${AI_RATE_LIMIT_PER_MINUTE:-30}
      BACKEND_PORT: ${BACKEND_PORT:-8001}
    ports:
      - "${BACKEND_PORT:-8001}:${BACKEND_PORT:-8001}"
    depends_on:
      - db

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8001/api}
      FRONTEND_PORT: ${FRONTEND_PORT:-5173}
    ports:
      - "${FRONTEND_PORT:-5173}:${FRONTEND_PORT:-5173}"
    depends_on:
      - backend

volumes:
  postgres_data:
